<!DOCTYPE html><html><head>
<meta charset="UTF-8"><title>新考察F：Jane Jacobs Zone 象限分析</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;padding:0;background:#0f0e17;font-family:"Noto Sans JP",sans-serif}
#hdr{background:#0f0e17;color:#f5a623;padding:10px 18px;font-size:1.15rem;font-weight:bold;border-bottom:1px solid #222}
#sub{background:#0f0e17;color:#a8dadc;padding:2px 18px 8px;font-size:.8rem}
#map{height:calc(100vh - 72px)}
.lbl{background:transparent!important;border:none!important;box-shadow:none!important;
  color:#fff;font-size:9px;font-weight:bold;text-shadow:0 0 3px #000}
#leg{position:absolute;bottom:28px;right:10px;background:rgba(15,14,23,.92);
  color:#e0e0e0;padding:10px 14px;border-radius:8px;font-size:.78rem;
  min-width:155px;z-index:999;border:1px solid #333;line-height:1.6}
#leg h4{margin:0 0 5px;color:#f5a623;font-size:.85rem}
</style></head><body>
<div id="hdr">新考察F：Jane Jacobs Zone 象限分析</div>
<div id="sub">商業密度×緑地件数の4象限でエリア分類。青＝商業と緑が共存する「理想型」（Jacobs Zone A）。</div>
<div id="map"></div>
<div id="leg"><h4>Jane Jacobs Zone</h4><div style='display:flex;align-items:center;gap:5px;margin:3px 0'><div style='width:12px;height:12px;border-radius:50%;background:#4cc9f0'></div>A: 商業×緑 両立（理想）</div><div style='display:flex;align-items:center;gap:5px;margin:3px 0'><div style='width:12px;height:12px;border-radius:50%;background:#f5a623'></div>B: 商業集積・緑不足</div><div style='display:flex;align-items:center;gap:5px;margin:3px 0'><div style='width:12px;height:12px;border-radius:50%;background:#80ed99'></div>C: 緑豊富・商業空洞</div><div style='display:flex;align-items:center;gap:5px;margin:3px 0'><div style='width:12px;height:12px;border-radius:50%;background:#e94560'></div>D: 低密度</div></div>
<script>
var map=L.map("map").setView([34.661,133.924],15);

L.circle([34.6555,133.9115],{radius:220,fillColor:"#f5a623",color:"#fff",weight:1.5,fillOpacity:0.82,opacity:0.95}).addTo(map).bindPopup(`<b>奉還町</b><br>象限: B:商業過多<br>商業施設: 16件 / 緑地: 39件`).bindTooltip("奉還町",{permanent:true,direction:"center",className:"lbl"});
